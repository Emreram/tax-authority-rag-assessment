services:
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"' || curl -sf http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  redis:
    image: redis/redis-stack-server:7.2.0-v10
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # .env is optional — defaults below cover a fresh clone with Docker Model Runner.
    # Create demo/.env (or copy demo/.env.example) only if you want to override.
    env_file:
      - path: .env
        required: false
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LLM_BASE_URL=${LLM_BASE_URL:-http://model-runner.docker.internal:12434/engines/llama.cpp/v1}
      - LLM_MODEL=${LLM_MODEL:-ai/gemma4:E2B}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-small}
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    depends_on:
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro
      - ./seed_data:/app/seed_data:ro
      - ../eval:/app/eval:ro
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL","curl -sf http://localhost:8000/health | grep -q '\"warmup_complete\":true'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  preingest:
    image: alpine/curl:8.10.0
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - ./seed_data:/seed_data:ro
    environment:
      - API_HOST=http://api:8000
      - DOC_DIR=/seed_data/pdfs
    entrypoint: ["sh","-c","apk add --no-cache python3 >/dev/null 2>&1 || true; sh /scripts/preingest.sh"]
    restart: "no"

volumes:
  opensearch-data:
  hf-cache:
